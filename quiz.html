    <script>

            },

                options: ["1492년", "1498년", "1519년", "1607년"],
                correct: 0,
                explanation: "1492년 콜럼버스는 서인도제도로 오인한 아메리카 대륙에 도달했습니다."
            },

                question: "을사늑약이 체결된 해는?",

                correct: 0,
                explanation: "1905년(을사년)에 을사늑약이 체결되어 한국의 외교권이 박탈되었습니다."
            }

        let currentQuestions = [];
        let currentIndex = 0;
        let score = 0;
        let isWaiting = false;
        let messageTimeout;

        // 배열 섞기 함수
        function shuffleArray(array) {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        }

        // 퀴즈 초기화
        function initQuiz() {
            // 20개 중 랜덤 10개 선택
            currentQuestions = shuffleArray(allQuestions).slice(0, 10);
            currentIndex = 0;
            score = 0;
            isWaiting = false;
            
            document.getElementById('resultScreen').classList.remove('show');
            document.getElementById('questionContainer').classList.remove('hide');
            document.querySelector('.header').style.display = 'block';
            
            updateProgress();
            showQuestion();
        }

        // 진행 상황 업데이트
        function updateProgress() {
            document.getElementById('currentNum').textContent = currentIndex + 1;
            document.getElementById('totalNum').textContent = currentQuestions.length;
            const progress = ((currentIndex + 1) / currentQuestions.length) * 100;
            document.getElementById('progressBar').style.width = progress + '%';
        }

        // 문제 표시
        function showQuestion() {
            const question = currentQuestions[currentIndex];
            const shuffledOptions = shuffleArray(
                question.options.map((opt, idx) => ({ text: opt, originalIndex: idx }))
            );
            
            // 현재 문제의 정답 인덱스 저장 (섞인 후의 인덱스로 변환)
            question.shuffledCorrectIndex = shuffledOptions.findIndex(
                opt => opt.originalIndex === question.correct
            );
            
            document.getElementById('questionText').textContent = question.question;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt.text;
                btn.onclick = () => checkAnswer(index);
                optionsContainer.appendChild(btn);
            });
            
            // 애니메이션 효과
            const container = document.getElementById('questionContainer');
            container.style.animation = 'none';
            setTimeout(() => {
                container.style.animation = 'fadeIn 0.5s ease';
            }, 10);
        }

        // 정답 체크
        function checkAnswer(selectedIndex) {
            if (isWaiting) return;
            
            isWaiting = true;
            const question = currentQuestions[currentIndex];
            const buttons = document.querySelectorAll('.option-btn');
            const isCorrect = selectedIndex === question.shuffledCorrectIndex;
            
            // 버튼 상태 표시
            buttons.forEach((btn, idx) => {
                btn.disabled = true;
                if (idx === question.shuffledCorrectIndex) {
                    btn.classList.add('correct');
                } else if (idx === selectedIndex && !isCorrect) {
                    btn.classList.add('wrong');
                }
            });
            
            // 메시지 표시
            const message = document.getElementById('messageOverlay');
            if (isCorrect) {
                message.textContent = '정답입니다! ✅';
                message.className = 'message-overlay correct show';
                score++;
            } else {
                message.textContent = '오답입니다! ❌';
                message.className = 'message-overlay wrong show';
            }
            
            // 2초 후 처리
            messageTimeout = setTimeout(() => {
                message.classList.remove('show');
                
                if (isCorrect) {
                    currentIndex++;
                    if (currentIndex < currentQuestions.length) {
                        updateProgress();
                        showQuestion();
                    } else {
                        showResult();
                    }
                } else {
                    // 오답인 경우 현재 문제 유지, 버튼만 초기화
                    buttons.forEach(btn => {
                        btn.disabled = false;
                        btn.classList.remove('correct', 'wrong');
                    });
                }
                
                isWaiting = false;
            }, 2000);
        }

        // 결과 화면 표시
        function showResult() {
            document.getElementById('questionContainer').classList.add('hide');
            document.querySelector('.header').style.display = 'none';
            
            const resultScreen = document.getElementById('resultScreen');
            resultScreen.classList.add('show');
            
            document.getElementById('finalScore').textContent = score;
            
            let message = '';
            const percentage = (score / currentQuestions.length) * 100;
            
            if (percentage === 100) {
                message = '완벽합니다! 역사 박사 수준! 🏆';
            } else if (percentage >= 80) {
                message = '훌륭합니다! 역사를 잘 알고 계시네요! 👏';
            } else if (percentage >= 60) {
                message = '괜찮습니다! 조금만 더 공부하면 될 거예요! 📖';
            } else {
                message = '아쉽네요. 역사 공부가 필요해요! 💪';
            }
            
            document.getElementById('resultMessage').textContent = message;
        }

        // 퀴즈 재시작
        function restartQuiz() {
            clearTimeout(messageTimeout);
            document.getElementById('messageOverlay').classList.remove('show');
            initQuiz();
        }

        // 페이지 로드 시 시작
        window.onload = initQuiz;
    </script>
</body>
</html>
